<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1" />
    <meta name="theme-color" content="#407E8C" />
    <meta
      name="description"
      content="Vidya's Holistic Healings offers compassionate Pranic Healings, chakra balancing, and gentle support for stress and anxiety."
    />
    <meta
      name="keywords"
      content="Pranic Healings , holistic healings , chakra balancing , stress healings, anxiety healings, Vidya"
    />
    <meta property="og:type" content="website" />
    <meta property="og:title" content="Vidya's Holistic Healings" />
    <meta
      property="og:description"
      content="Guiding you toward balance, healings, and inner peace through Pranic Healings in , India."
    />
    <meta property="og:site_name" content="Vidya's Holistic Healings" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;0,600;1,300;1,400;1,500&family=Jost:wght@200;300;400;500;600;700&family=Marcellus&display=swap"
      rel="stylesheet"
    />
    <title>Vidya's Holistic Healings</title>
  </head>
  <body>

    <!-- Splash screen — shows before CSS/React load. Drop logo.png into client/public/ to show the logo. -->
    <div id="splash" style="position:fixed;inset:0;z-index:9999;background:radial-gradient(ellipse at center,#0D4D68 0%, #083A4F 55%, #041F2B 100% );display:flex;flex-direction:column;align-items:center;justify-content:center;gap:20px;transition:opacity 0.7s ease">
      <img src="/logo.png" alt="Vidya's Holistic Healings" onerror="this.style.display='none'" style="width:220px;height:auto;display:flex;align-items:center;justify-content:center;filter:drop-shadow(0 4px 24px rgba(0,0,0,0.35))" />
      <p style="color:rgba(229,225,221,0.7);font-family:serif;font-style:italic;font-weight:300;letter-spacing:0.18em;font-size:13px;margin:0">Vidya's Holistic Healings</p>
    </div>
    <script>
      setTimeout(function(){
        var s=document.getElementById('splash');
        if(s){s.style.opacity='0';s.style.pointerEvents='none';setTimeout(function(){if(s.parentNode)s.remove();},700);}
      },2000);
    </script>

    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
   
  </body>
</html>
